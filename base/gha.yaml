apiVersion: v1
kind: ServiceAccount
metadata:
  name: gha-deployer
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gha-namespace-reader
rules:
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gha-namespace-reader-binding
subjects:
- kind: ServiceAccount
  name: gha-deployer
  namespace: kube-system
roleRef:
  kind: ClusterRole
  name: gha-namespace-reader
  apiGroup: rbac.authorization.k8s.io

  ##kubectl create token gha-deployer -n kube-system --duration=8760h