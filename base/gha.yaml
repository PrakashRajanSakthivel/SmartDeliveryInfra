apiVersion: v1
kind: ServiceAccount
metadata:
  name: gha-deployer
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ns-reader
  namespace: kube-system
rules:
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gha-ns-reader-binding
  namespace: kube-system
subjects:
- kind: ServiceAccount
  name: gha-deployer
  namespace: kube-system
roleRef:
  kind: Role
  name: ns-reader
  apiGroup: rbac.authorization.k8s.io