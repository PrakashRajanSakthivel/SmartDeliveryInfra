apiVersion: v1
kind: Config
clusters:
- name: default
  cluster:
    server: https://46.62.150.44:6443
    certificate-authority-data: 
users:
- name: gha-deployer
  user:
    # Token is short-lived (1h). Regenerate before use:
    #   kubectl create token gha-deployer -n kube-system --duration=8760h
    # Then store the output as the GHA secret KUBECONFIG (base64-encode the full file).
    token: __GHA_DEPLOYER_TOKEN__
contexts:
- name: gha-context
  context:
    cluster: default
    user: gha-deployer
current-context: gha-context
