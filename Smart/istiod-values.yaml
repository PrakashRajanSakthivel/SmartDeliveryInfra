# -----------------------------------------------------------------------
# istiod Helm values — SmartDelivery (k3s single-node, resource-constrained)
# Chart  : istio/istiod  version 1.25.2
# Node   : 4 vCPU / 7.5 GiB  (sd-master)
# Install: helm install istiod istio/istiod -n istio-system --create-namespace \
#            -f Smart/istiod-values.yaml
#
# NOTE: resources were reduced via kubectl patch after initial install
#       to minimise memory footprint on the single VPS node.
#       Values below reflect what is ACTUALLY RUNNING in the cluster.
#
# WARNING: Do not change extensionProviders without also updating any
#          Telemetry resources that reference those provider names.
# -----------------------------------------------------------------------

resources:
  requests:
    cpu: 10m
    memory: 100Mi
  # No limits set intentionally — pilot must not be OOM-killed on a single node.

meshConfig:
  # Emit Envoy access logs to stdout (visible via kubectl logs)
  accessLogFile: /dev/stdout

  # Merge Prometheus metrics from app + Envoy into a single scrape endpoint
  enablePrometheusMerge: true

  # Global default: every sidecar sends 100 % of traces to Jaeger.
  # Override per-namespace with a Telemetry resource (release/istio-observability.yaml).
  defaultConfig:
    tracing:
      sampling: 100

  # Default providers applied mesh-wide unless overridden by a Telemetry resource
  defaultProviders:
    metrics:
    - prometheus
    tracing:
    - jaeger

  # Named extension providers referenced by Telemetry resources.
  # otel / skywalking / otel-tracing were injected automatically by the
  # Helm chart defaults — they were NOT explicitly configured.
  # Removing them would be a breaking change if anything references them
  # by name, so they are kept as-is.
  extensionProviders:
  - name: otel
    envoyOtelAls:
      port: 4317
      service: opentelemetry-collector.observability.svc.cluster.local
  - name: skywalking
    skywalking:
      port: 11800
      service: tracing.istio-system.svc.cluster.local
  - name: otel-tracing
    opentelemetry:
      port: 4317
      service: opentelemetry-collector.observability.svc.cluster.local
  - name: jaeger
    opentelemetry:
      port: 4317
      service: jaeger-collector.istio-system.svc.cluster.local

global:
  proxy:
    autoInject: enabled
  logAsJson: false

# Single-replica — no autoscaling needed for this showcase cluster
pilot:
  autoscaleEnabled: false
  replicaCount: 1