apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: elasticsearch-data
  namespace: logging
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  volumeName: elasticsearch-hetzner-pv  # binds to the static PV above
  storageClassName: ""                  # empty = static provisioning, no StorageClass needed
