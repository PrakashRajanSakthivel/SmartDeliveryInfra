apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: smartdelivery
  labels:
    app: cart-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
        version: v1
    spec:
      imagePullSecrets:
      - name: ghcr-pull-secret
      containers:
      - name: cart-service
        image: ghcr.io/prakashrajansakthivel/cartservice:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "240Mi"  # .NET CLR idle RSS ~110-130Mi; 80% threshold = 192Mi keeps HPA stable at idle
            cpu: "100m"
          limits:
            memory: "400Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 15
          failureThreshold: 3
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 15
          failureThreshold: 3
          timeoutSeconds: 5
        volumeMounts:
        - name: config-volume
          mountPath: /app/appsettings.json
          subPath: appsettings.json
      volumes:
      - name: config-volume
        configMap:
          name: cart-service-config
