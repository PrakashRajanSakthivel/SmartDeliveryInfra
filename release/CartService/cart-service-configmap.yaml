apiVersion: v1
kind: ConfigMap
metadata:
  name: cart-service-config
  namespace: smartdelivery
data:
  appsettings.json: |
    {
      "Logging": {
        "LogLevel": {
          "Default": "Information",
          "Microsoft.AspNetCore": "Warning"
        }
      },
      "AllowedHosts": "*",
      "ConnectionStrings": {
        "CartDatabase": "__CART_DB_CONNECTION__"
      },
      "Jwt": {
        "Issuer": "SmartOrderSystem",
        "Audience": "SmartOrderSystemUsers",
        "SecretKey": "VerySecretKeyForSigningTokens123!"
      },
      "Elasticsearch": {
        "Uri": "http://elasticsearch.logging.svc.cluster.local:9200",
        "Username": "elastic",
        "Password": "yourpassword"
      },
      "Serilog": {
        "Using": [ "Serilog.Sinks.Console", "Serilog.Sinks.Elasticsearch" ],
        "MinimumLevel": {
          "Default": "Information",
          "Override": {
            "Microsoft": "Warning",
            "System": "Warning",
            "Microsoft.AspNetCore": "Information"
          }
        },
        "WriteTo": [
          {
            "Name": "Console"
          },
          {
            "Name": "Elasticsearch",
            "Args": {
              "nodeUris": "http://elasticsearch.logging.svc.cluster.local:9200",
              "indexFormat": "cartservice-logs-{0:yyyy.MM}",
              "autoRegisterTemplate": true,
              "batchPostingLimit": 10,
              "period": 2,
              "inlineFields": true,
              "bufferBaseFilename": "./logs/elasticsearch-buffer",
              "emitEventFailure": "WriteToSelfLog",
              "queueSizeLimit": 10000
            }
          }
        ],
        "Enrich": [ "FromLogContext", "WithMachineName", "WithProcessId" ],
        "Properties": {
          "Application": "CartService",
          "Environment": "Production"
        }
      },
      "ServiceName": "CartService"
    }
