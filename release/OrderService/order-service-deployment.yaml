apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: smartdelivery
  labels:
    app: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
        version: v1
    spec:
      imagePullSecrets:
      - name: ghcr-pull-secret
      containers:
      - name: order-service
        image: ghcr.io/prakashrajansakthivel/orderservice:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "240Mi"  # .NET CLR idle RSS ~130-165Mi; 80% threshold = 192Mi keeps HPA stable at idle
            cpu: "100m"
          limits:
            memory: "400Mi"
            cpu: "200m"
        volumeMounts:
        - name: config-volume
          mountPath: /app/appsettings.json
          subPath: appsettings.json
      volumes:
      - name: config-volume
        configMap:
          name: order-service-config
