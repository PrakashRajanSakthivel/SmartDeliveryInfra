apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: restaurent-service-hpa
  namespace: smartdelivery
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: restaurent-service
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75