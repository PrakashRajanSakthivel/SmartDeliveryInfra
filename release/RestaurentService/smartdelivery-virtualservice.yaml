apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: smartdelivery-vs
  namespace: smartdelivery
spec:
  hosts:
  - "smartdeliveryapi.rajanlabs.com"
  gateways:
  - istio-system/istio-public-gateway
  http:
  # Route for RestaurentService
  - match:
    - uri:
        prefix: /restaurentservice/
    rewrite:
      uri: /
    route:
    - destination:
        host: restaurent-service.smartdelivery.svc.cluster.local
        port:
          number: 8080

  # Route for OrderService
  - match:
    - uri:
        prefix: /orderservice/
    rewrite:
      uri: /
    route:
    - destination:
        host: order-service.smartdelivery.svc.cluster.local
        port:
          number: 8080

  # Route for PaymentService
  - match:
    - uri:
        prefix: /paymentservice/
    rewrite:
      uri: /
    route:
    - destination:
        host: payment-service.smartdelivery.svc.cluster.local
        port:
          number: 8080

  # Route for CartService
  - match:
    - uri:
        prefix: /cartservice/
    rewrite:
      uri: /
    route:
    - destination:
        host: cart-service.smartdelivery.svc.cluster.local
        port:
          number: 8080

  # Route for AuthService
  - match:
    - uri:
        prefix: /authservice/
    rewrite:
      uri: /
    route:
    - destination:
        host: auth-service.smartdelivery.svc.cluster.local
        port:
          number: 8080

  # Optional: Default route if someone goes to just the domain
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: restaurent-service.smartdelivery.svc.cluster.local # or a dedicated frontend service
        port:
          number: 8080