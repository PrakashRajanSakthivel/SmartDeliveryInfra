apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: smartdelivery-vs
  namespace: smartdelivery
spec:
  hosts:
  - "smartdeliveryapi.rajanlabs.com"
  gateways:
  - istio-system/istio-public-gateway
  http:
  # ---------------------------------------------------------------------------
  # CORS policy — Envoy intercepts OPTIONS preflights at the gateway and replies
  # directly (200 + CORS headers) without forwarding to the services.
  # Tighten allowOrigins to your exact Azure SWA URL for production.
  # ---------------------------------------------------------------------------

  # Route for RestaurentService
  - match:
    - uri:
        prefix: /restaurentservice/
    rewrite:
      uri: /
    corsPolicy:
      allowOrigins:
      - exact: "https://smartdelivery.rajanlabs.com"
      - exact: "http://localhost:4200"
      allowMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
      allowHeaders:
      - Authorization
      - Content-Type
      - Accept
      allowCredentials: true
      maxAge: "24h"
    route:
    - destination:
        host: restaurent-service.smartdelivery.svc.cluster.local
        port:
          number: 8080

  # Route for OrderService
  - match:
    - uri:
        prefix: /orderservice/
    rewrite:
      uri: /
    corsPolicy:
      allowOrigins:
      - exact: "https://smartdelivery.rajanlabs.com"
      - exact: "http://localhost:4200"
      allowMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
      allowHeaders:
      - Authorization
      - Content-Type
      - Accept
      allowCredentials: true
      maxAge: "24h"
    route:
    - destination:
        host: order-service.smartdelivery.svc.cluster.local
        port:
          number: 8080

  # Route for PaymentService
  - match:
    - uri:
        prefix: /paymentservice/
    rewrite:
      uri: /
    corsPolicy:
      allowOrigins:
      - exact: "https://smartdelivery.rajanlabs.com"
      - exact: "http://localhost:4200"
      allowMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
      allowHeaders:
      - Authorization
      - Content-Type
      - Accept
      allowCredentials: true
      maxAge: "24h"
    route:
    - destination:
        host: payment-service.smartdelivery.svc.cluster.local
        port:
          number: 8080

  # Route for CartService
  - match:
    - uri:
        prefix: /cartservice/
    rewrite:
      uri: /
    corsPolicy:
      allowOrigins:
      - exact: "https://smartdelivery.rajanlabs.com"
      - exact: "http://localhost:4200"
      allowMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
      allowHeaders:
      - Authorization
      - Content-Type
      - Accept
      allowCredentials: true
      maxAge: "24h"
    route:
    - destination:
        host: cart-service.smartdelivery.svc.cluster.local
        port:
          number: 8080

  # Route for AuthService
  - match:
    - uri:
        prefix: /authservice/
    rewrite:
      uri: /
    corsPolicy:
      allowOrigins:
      - exact: "https://smartdelivery.rajanlabs.com"
      - exact: "http://localhost:4200"
      allowMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
      allowHeaders:
      - Authorization
      - Content-Type
      - Accept
      allowCredentials: true
      maxAge: "24h"
    route:
    - destination:
        host: auth-service.smartdelivery.svc.cluster.local
        port:
          number: 8080

  # Optional: Default route if someone goes to just the domain
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: restaurent-service.smartdelivery.svc.cluster.local # or a dedicated frontend service
        port:
          number: 8080