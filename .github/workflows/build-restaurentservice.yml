name: Build and Push Restaurant Service

on:
  workflow_dispatch:
    inputs:
      code_ref:
        description: 'SmartDelivery branch/tag to build'
        required: true
        default: 'feature/ui_integration'
  # schedule:
  #   - cron: '0 0 * * *'
  push:
    branches:
      - main
      - feature/pipeline-init

jobs:
  build-and-push:
    uses: ./.github/workflows/build-service-reusable.yml
    secrets: inherit
    with:
      service_display_name: Restaurant Service
      source_ref: ${{ inputs.code_ref || 'feature/ui_integration' }}
      project_path: src/services/RestaurantService/Restaurant.API/RestaurantService.API.csproj
      service_folder: RestaurantService
      dll_name: RestaurantService.API.dll
      dockerfile_name: restaurentservice
      image_tag: ghcr.io/prakashrajansakthivel/restaurentservice:${{ github.run_id }}
      remove_default_appsettings: true
