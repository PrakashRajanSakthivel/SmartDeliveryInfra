name: Build and Push Restaurant Service

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Checkout the code repo (SmartDelivery)
      - name: Checkout Code Repo
        uses: actions/checkout@v4
        with:
          repository: PrakashRajanSakthivel/SmartDelivery
          ref: feature/buildfix
          token: ${{ secrets.CODE_REPO_TOKEN }}
      - name: Clean workspace
        run: |
          git clean -fdx
          
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build src/services/RestaurantService/Restaurant.API/RestaurantService.API.csproj --configuration Release

      # - name: Test
      #   run: dotnet test src/RestaurantService.API/RestaurantService.API.csproj

      # - name: Publish
      #   run: dotnet publish src/services/RestaurantService/Restaurant.API/RestaurantService.API.csproj --configuration Release --output ./publish

      - name: Publish RestaurantService
        run: dotnet publish src/services/RestaurantService/Restaurant.API/RestaurantService.API.csproj -c Release -o ./publish/RestaurantService
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      # Move the publish output if needed so Docker context can access it
      - name: Move publish output to Docker context (if needed)
        run: |
          mkdir -p src/Dockerfiles/publish
          cp -r ./publish/* src/Dockerfiles/publish/

      - name: Build and Push Restaurant Image
        uses: docker/build-push-action@v5
        with:
          context: src/Dockerfiles
          file: src/Dockerfiles/RestaurantDockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/prakashrajansakthivel/restaurant:latest
            ghcr.io/prakashrajansakthivel/restaurant:v${{ github.run_number }}

      - name: Create build info
        run: |
          echo "BUILD_NUMBER=${{ github.run_number }}" > build-info.txt
          echo "IMAGE_TAG=v${{ github.run_number }}" >> build-info.txt
          echo "IMAGE_NAME=ghcr.io/prakashrajansakthivel/restaurant" >> build-info.txt
          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> build-info.txt
          echo "COMMIT_SHA=${{ github.sha }}" >> build-info.txt
          echo "BRANCH=${{ github.ref_name }}" >> build-info.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            build-info.txt
            src/Dockerfiles/publish/
          retention-days: 30

