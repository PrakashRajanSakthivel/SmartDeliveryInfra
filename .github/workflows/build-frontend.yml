# SmartDelivery Frontend — Build & Deploy to Azure Static Web App
# Updated: 2025-06-23
#


name: Build and Deploy Frontend

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: 'Branch/ref in SmartDelivery repo to build'
        required: true
        default: 'feature/ui_integration'
        type: string
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
  push:
    branches:
      - main
      - feature/pipeline-init

jobs:
  build_and_deploy:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout SmartDelivery source
        uses: actions/checkout@v4
        with:
          repository: PrakashRajanSakthivel/SmartDelivery
          ref: ${{ inputs.source_ref || 'feature/ui_integration' }}
          token: ${{ secrets.CODE_REPO_TOKEN }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Increase Angular component style budgets
        working-directory: frontend
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('angular.json', 'utf8'));
            for (const proj of Object.values(cfg.projects)) {
              const budgets = proj?.architect?.build?.configurations?.production?.budgets;
              if (budgets) {
                for (const b of budgets) {
                  if (b.type === 'anyComponentStyle') {
                    b.maximumWarning = '6kb';
                    b.maximumError = '8kb';
                  }
                }
              }
            }
            fs.writeFileSync('angular.json', JSON.stringify(cfg, null, 2));
            console.log('Budget limits updated successfully.');
          "

      - name: Build Angular app (production)
        working-directory: frontend
        run: npm run build -- --configuration production

      - name: Normalize Angular build output
        run: |
          # Angular 17+ outputs to browser/ subdirectory; older versions output directly.
          if [ -f "frontend/dist/smart-delivery-frontend/browser/index.html" ]; then
            cp -r frontend/dist/smart-delivery-frontend/browser frontend/dist/deploy
          else
            cp -r frontend/dist/smart-delivery-frontend frontend/dist/deploy
          fi

      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend/dist/deploy"
          output_location: ""
          skip_app_build: true
