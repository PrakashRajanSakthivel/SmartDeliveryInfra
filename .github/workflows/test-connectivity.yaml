name: Test Kubernetes Connection

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - dockerbuilds
      - '**'  # matches all branches

jobs:
  test-connect:
    runs-on: ubuntu-latest
    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'
      
      - name: Write kubeconfig from secret
        run: |
          echo "${{ secrets.KUBECONFIG }}" > kubeconfig

      - name: Open Hetzner Firewall port 6443 to all IPs
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          FIREWALL_ID: ${{ secrets.FIREWALL_ID }}
        shell: pwsh
        run: |
          $headers = @{ Authorization = "Bearer $env:HCLOUD_TOKEN" }
          $fwId = $env:FIREWALL_ID

          # Fetch existing rules
          $fw = Invoke-RestMethod -Method Get -Uri "https://api.hetzner.cloud/v1/firewalls/$fwId" -Headers $headers
          $existingRules = $fw.firewall.rules

          # Compose new rule
          $newRule = @{
              direction = "in"
              protocol = "tcp"
              port = "6443"
              source_ips = @("0.0.0.0/0")
              description = "Open Kubernetes API for CI/CD"
          }

          # Ensure rule isn't duplicated
          $updatedRules = $existingRules | Where-Object {
              !(($_.protocol -eq "tcp") -and ($_.port -eq "6443") -and ($_.source_ips -contains "0.0.0.0/0"))
          }
          $updatedRules += $newRule

          # Update firewall
          $body = @{ rules = $updatedRules } | ConvertTo-Json -Depth 5
          Invoke-RestMethod -Method Put -Uri "https://api.hetzner.cloud/v1/firewalls/$fwId" -Headers $headers -Body $body
          Write-Host "Port 6443 opened to all IPs."

      - name: Test connection to cluster
        run: |
          kubectl --kubeconfig=kubeconfig get ns

      - name: Close Hetzner Firewall port 6443 to all IPs
        if: always()
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          FIREWALL_ID: ${{ secrets.FIREWALL_ID }}
        shell: pwsh
        run: |
          $headers = @{ Authorization = "Bearer $env:HCLOUD_TOKEN" }
          $fwId = $env:FIREWALL_ID

          # Fetch current rules
          $fw = Invoke-RestMethod -Method Get -Uri "https://api.hetzner.cloud/v1/firewalls/$fwId" -Headers $headers
          $existingRules = $fw.firewall.rules

          # Remove any rule opening 6443 to 0.0.0.0/0
          $updatedRules = $existingRules | Where-Object {
              !(($_.protocol -eq "tcp") -and ($_.port -eq "6443") -and ($_.source_ips -contains "0.0.0.0/0"))
          }

          # Update firewall
          $body = @{ rules = $updatedRules } | ConvertTo-Json -Depth 5
          Invoke-RestMethod -Method Put -Uri "https://api.hetzner.cloud/v1/firewalls/$fwId" -Headers $headers -Body $body
          Write-Host "Port 6443 to all IPs removed."
