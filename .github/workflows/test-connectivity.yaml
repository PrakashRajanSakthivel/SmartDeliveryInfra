name: Test Kubernetes Connection

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - dockerbuilds
      - '**'  # matches all branches

jobs:
  test-connect:
    runs-on: ubuntu-latest
    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'
      
      - name: Write kubeconfig from secret
        run: |
          echo "${{ secrets.KUBECONFIG }}" > kubeconfig

      - name: Open Hetzner Firewall port 6443 to all IPs
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          FIREWALL_ID: ${{ secrets.FIREWALL_ID }}
        shell: pwsh
        run: |
          Write-Host "Current directory: $(Get-Location)"
          Write-Host "GitHub workspace: $env:GITHUB_WORKSPACE"
          Write-Host "=== FULL DIRECTORY LISTING ==="
          Get-ChildItem -Recurse | Format-Table Name, FullName, PSIsContainer
          Write-Host "=== SEARCHING FOR POWERSHELL SCRIPTS ==="
          Get-ChildItem -Recurse -Filter "*.ps1" | Format-Table Name, FullName
          Write-Host "=== SEARCHING FOR FIREWALL SCRIPTS ==="
          Get-ChildItem -Recurse -Filter "*firewall*" | Format-Table Name, FullName
          Write-Host "=== CHECKING SPECIFIC PATHS ==="
          Write-Host "base directory exists: $(Test-Path 'base')"
          Write-Host "base/open-firewall-port.ps1 exists: $(Test-Path 'base/open-firewall-port.ps1')"
          Write-Host "base/close-firewall-port.ps1 exists: $(Test-Path 'base/close-firewall-port.ps1')"
          Write-Host "=== TRYING TO FIND SCRIPTS ANYWHERE ==="
          $scripts = Get-ChildItem -Recurse -Filter "*firewall*.ps1"
          if ($scripts) {
            Write-Host "Found firewall scripts:"
            $scripts | ForEach-Object { Write-Host "  $($_.FullName)" }
            $scriptPath = $scripts[0].FullName
            Write-Host "Using script: $scriptPath"
            pwsh -ExecutionPolicy Bypass -File $scriptPath -Port 6443 -Description "Open Kubernetes API for CI/CD"
          } else {
            Write-Error "No firewall scripts found in repository"
            exit 1
          }

      - name: Test connection to cluster
        run: |
          kubectl --kubeconfig=kubeconfig get ns

      - name: Close Hetzner Firewall port 6443 to all IPs
        if: always()
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          FIREWALL_ID: ${{ secrets.FIREWALL_ID }}
        shell: pwsh
        run: |
          Write-Host "Current directory: $(Get-Location)"
          Write-Host "GitHub workspace: $env:GITHUB_WORKSPACE"
          Write-Host "=== FINDING CLOSE FIREWALL SCRIPT ==="
          $scripts = Get-ChildItem -Recurse -Filter "*close-firewall*.ps1"
          if ($scripts) {
            Write-Host "Found close firewall scripts:"
            $scripts | ForEach-Object { Write-Host "  $($_.FullName)" }
            $scriptPath = $scripts[0].FullName
            Write-Host "Using script: $scriptPath"
            pwsh -ExecutionPolicy Bypass -File $scriptPath -Port 6443
          } else {
            Write-Error "No close firewall scripts found in repository"
            exit 1
          }
