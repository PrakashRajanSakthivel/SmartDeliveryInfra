name: Build and Push Cart Service

on:
  workflow_dispatch:
    inputs:
      code_ref:
        description: 'SmartDelivery branch/tag to build'
        required: true
        default: 'feature/ui_integration'
  # schedule:
  #   - cron: '30 0 * * *'
  push:
    branches:
      - main
      - feature/pipeline-init

jobs:
  build-and-push:
    uses: ./.github/workflows/build-service-reusable.yml
    secrets: inherit
    with:
      service_display_name: Cart Service
      source_ref: ${{ inputs.code_ref || 'feature/ui_integration' }}
      project_path: src/services/CartService/CartService.API/CartService.API.csproj
      service_folder: CartService
      dll_name: CartService.API.dll
      dockerfile_name: cartservice
      image_tag: ghcr.io/prakashrajansakthivel/cartservice:${{ github.run_id }}
