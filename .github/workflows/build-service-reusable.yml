name: Reusable Build and Push Service

on:
  workflow_call:
    inputs:
      service_display_name:
        description: Friendly service name for logs
        required: true
        type: string
      source_repo:
        description: Source code repository to checkout
        required: false
        type: string
        default: PrakashRajanSakthivel/SmartDelivery
      source_ref:
        description: Source branch/ref to checkout
        required: true
        type: string
      project_path:
        description: Path to the .csproj file
        required: true
        type: string
      service_folder:
        description: Folder name under publish/
        required: true
        type: string
      dll_name:
        description: Entrypoint DLL name
        required: true
        type: string
      dockerfile_name:
        description: Name suffix for generated Dockerfile
        required: true
        type: string
      image_tag:
        description: Full Docker image tag to push
        required: true
        type: string
      remove_default_appsettings:
        description: Remove default appsettings files in image
        required: false
        type: boolean
        default: false
    secrets:
      CODE_REPO_TOKEN:
        required: true
      GHCR_PAT:
        required: true

jobs:
  build-and-push:
    name: Build and Push ${{ inputs.service_display_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repo }}
          ref: ${{ inputs.source_ref }}
          token: ${{ secrets.CODE_REPO_TOKEN }}

      - name: Clean workspace
        run: git clean -fdx

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build project
        run: dotnet build "${{ inputs.project_path }}" --configuration Release

      - name: Publish artifacts
        run: dotnet publish "${{ inputs.project_path }}" --configuration Release --output "./publish/${{ inputs.service_folder }}"

      - name: Create runtime Dockerfile
        run: |
          cat <<EOF > Dockerfile.${{ inputs.dockerfile_name }}
          FROM mcr.microsoft.com/dotnet/aspnet:8.0
          WORKDIR /app
          ENV ASPNETCORE_URLS=http://+:8080
          ENV ASPNETCORE_ENVIRONMENT=Kubernetes
          COPY ./publish/${{ inputs.service_folder }}/ .
          EOF

          if [ "${{ inputs.remove_default_appsettings }}" = "true" ]; then
            echo 'RUN rm -f appsettings.json appsettings.Development.json appsettings.Production.json' >> Dockerfile.${{ inputs.dockerfile_name }}
          fi

          echo "ENTRYPOINT [\"dotnet\", \"${{ inputs.dll_name }}\"]" >> Dockerfile.${{ inputs.dockerfile_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.${{ inputs.dockerfile_name }}
          push: true
          tags: ${{ inputs.image_tag }}
          platforms: linux/amd64,linux/arm64
