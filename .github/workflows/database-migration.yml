name: Database Migration Pipeline

# Flag to control migration behavior
env:
  RUN_MIGRATIONS_IN_PR: true

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
        - production
        - staging
        - development
      service:
        description: 'Service to migrate (leave empty for all)'
        required: false
        type: choice
        options:
        - all
        - restaurant
        - order
        - cart
        - payment
        default: 'restaurant'
      dry_run:
        description: 'Dry run - show what would be applied'
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
      - dockerbuilds
      - feature/restaurentservice
    paths:
      - 'src/services/*/Migrations/**'
      - 'src/services/*/Data/**'
      - '.github/workflows/database-migration.yml'
  pull_request:
    branches:
      - main
      - dockerbuilds
    paths:
      - 'src/services/*/Migrations/**'
      - 'src/services/*/Data/**'
      - '.github/workflows/database-migration.yml'

jobs:
  validate-migrations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Application Repository
        uses: actions/checkout@v4
        with:
          repository: PrakashRajanSakthivel/SmartDelivery
          ref: feature/healthcheck
          token: ${{ secrets.CODE_REPO_TOKEN }}
      
      - name: Clean workspace
        run: |
          git clean -fdx
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Install EF Core Tools
        run: |
          dotnet tool install --global dotnet-ef
          dotnet tool restore
      
      - name: Validate Migrations
        run: |
          echo "=== Validating Migrations ==="
          echo "Checking if all service migrations are valid..."
          
          # Restaurant Service
          if [ -d "src/services/RestaurantService/RestaurantService.Infra/Data/Migrations" ]; then
            echo "✅ Restaurant Service migrations found"
          else
            echo "❌ Restaurant Service migrations not found"
            exit 1
          fi
          
          # Order Service
          if [ -d "src/services/OrderService/OrderService.Infra/Data/Migrations" ]; then
            echo "✅ Order Service migrations found"
          else
            echo "❌ Order Service migrations not found"
            exit 1
          fi
          
          # Cart Service
          if [ -d "src/services/CartService/CartService.Infra/Migrations" ]; then
            echo "✅ Cart Service migrations found"
          else
            echo "❌ Cart Service migrations not found"
            exit 1
          fi
          
          echo "All migrations validated successfully!"

  migrate-database:
    runs-on: ubuntu-latest
    needs: validate-migrations
    
    steps:
      - name: Checkout Application Repository
        uses: actions/checkout@v4
        with:
          repository: PrakashRajanSakthivel/SmartDelivery
          ref: feature/healthcheck
          token: ${{ secrets.CODE_REPO_TOKEN }}
      
      - name: Clean workspace
        run: |
          git clean -fdx
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Install EF Core Tools
        run: |
          dotnet tool install --global dotnet-ef
          dotnet tool restore
      
      - name: Get Runner IP Address
        id: runner-ip
        run: |
          echo "=== GitHub Actions Runner IP Address ==="
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Runner IP: $RUNNER_IP"
          echo "ip=$RUNNER_IP" >> $GITHUB_OUTPUT
          echo ""
      
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Add IP to Azure SQL Firewall
        id: add-firewall-rule
        run: |
          echo "=== Adding IP to Azure SQL Firewall ==="
          RUNNER_IP="${{ steps.runner-ip.outputs.ip }}"
          RULE_NAME="GitHubActions-Runner-${{ github.run_id }}"
          
          echo "Adding firewall rule: $RULE_NAME for IP: $RUNNER_IP"
          
          az sql server firewall-rule create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --server ${{ secrets.AZURE_SQL_SERVER }} \
            --name "$RULE_NAME" \
            --start-ip-address "$RUNNER_IP" \
            --end-ip-address "$RUNNER_IP"
          
          echo "rule_name=$RULE_NAME" >> $GITHUB_OUTPUT
          echo "✅ Firewall rule added successfully"
          echo ""
          echo "Waiting 30 seconds for firewall rule to propagate..."
          sleep 30
      
      - name: Set migration info
        id: migration-info
        run: |
          echo "environment=${{ github.event.inputs.environment || 'production' }}" >> $GITHUB_OUTPUT
          echo "service=${{ github.event.inputs.service || 'all' }}" >> $GITHUB_OUTPUT
          echo "dry_run=${{ github.event.inputs.dry_run || 'false' }}" >> $GITHUB_OUTPUT
          echo "commit_sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
      
      - name: Run Restaurant Service Migration
        if: env.RUN_MIGRATIONS_IN_PR == 'true' || github.event.inputs.service == 'all' || github.event.inputs.service == 'restaurant'
        run: |
          echo "=== Restaurant Service Migration ==="
          echo "Runner IP: ${{ steps.runner-ip.outputs.ip }}"
          echo "Connection String: ${{ secrets.RESTAURANT_DB_CONNECTION_STRING }}"
          echo ""
          
          cd src/services/RestaurantService/RestaurantService.Infra
          
          # Create appsettings.json with connection string for EF Core tools
          cat > appsettings.json << EOF
          {
            "ConnectionStrings": {
              "RestaurantDatabase": "${{ secrets.RESTAURANT_DB_CONNECTION_STRING }}"
            }
          }
          EOF
          
                     echo "Created appsettings.json for EF Core tools"
           
           if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
             echo "DRY RUN: Restaurant Service migrations"
             dotnet ef migrations list --no-build
           else
             echo "Checking pending migrations..."
             PENDING_MIGRATIONS=$(dotnet ef migrations list --no-build | grep -c "Pending" || echo "0")
             
             if [ "$PENDING_MIGRATIONS" -gt 0 ]; then
               echo "Found $PENDING_MIGRATIONS pending migrations. Applying..."
               dotnet ef database update --verbose
             else
               echo "✅ No pending migrations found. Database is up to date."
             fi
           fi
        env:
          ConnectionStrings__RestaurantDatabase: ${{ secrets.RESTAURANT_DB_CONNECTION_STRING }}
      
      - name: Run Order Service Migration
        if: env.RUN_MIGRATIONS_IN_PR == 'true' || github.event.inputs.service == 'all' || github.event.inputs.service == 'order'
        run: |
          echo "=== Order Service Migration ==="
          echo "Runner IP: ${{ steps.runner-ip.outputs.ip }}"
          echo ""
          
          cd src/services/OrderService/OrderService.Infra
          
          # Create appsettings.json with connection string for EF Core tools
          cat > appsettings.json << EOF
          {
            "ConnectionStrings": {
              "OrderDatabase": "${{ secrets.ORDER_DB_CONNECTION_STRING }}"
            }
          }
          EOF
          
                     echo "Created appsettings.json for EF Core tools"
           
           if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
             echo "DRY RUN: Order Service migrations"
             dotnet ef migrations list --no-build
           else
             echo "Checking pending migrations..."
             PENDING_MIGRATIONS=$(dotnet ef migrations list --no-build | grep -c "Pending" || echo "0")
             
             if [ "$PENDING_MIGRATIONS" -gt 0 ]; then
               echo "Found $PENDING_MIGRATIONS pending migrations. Applying..."
               dotnet ef database update --verbose
             else
               echo "✅ No pending migrations found. Database is up to date."
             fi
           fi
        env:
          ConnectionStrings__OrderDatabase: ${{ secrets.ORDER_DB_CONNECTION_STRING }}
    
      - name: Run Cart Service Migration
        if: env.RUN_MIGRATIONS_IN_PR == 'true' || github.event.inputs.service == 'all' || github.event.inputs.service == 'cart'
        run: |
          echo "=== Cart Service Migration ==="
          echo "Runner IP: ${{ steps.runner-ip.outputs.ip }}"
          echo ""
          
          cd src/services/CartService/CartService.Infra
          
          # Create appsettings.json with connection string for EF Core tools
          cat > appsettings.json << EOF
          {
            "ConnectionStrings": {
              "CartDatabase": "${{ secrets.CART_DB_CONNECTION_STRING }}"
            }
          }
          EOF
          
                     echo "Created appsettings.json for EF Core tools"
           
           if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
             echo "DRY RUN: Cart Service migrations"
             dotnet ef migrations list --no-build
           else
             echo "Checking pending migrations..."
             PENDING_MIGRATIONS=$(dotnet ef migrations list --no-build | grep -c "Pending" || echo "0")
             
             if [ "$PENDING_MIGRATIONS" -gt 0 ]; then
               echo "Found $PENDING_MIGRATIONS pending migrations. Applying..."
               dotnet ef database update --verbose
             else
               echo "✅ No pending migrations found. Database is up to date."
             fi
           fi
        env:
          ConnectionStrings__CartDatabase: ${{ secrets.CART_DB_CONNECTION_STRING }}
      
      - name: Migration Summary
        if: always()
        run: |
          echo "## 🗄️ Database Migration Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ steps.migration-info.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Service:** ${{ steps.migration-info.outputs.service }}" >> $GITHUB_STEP_SUMMARY
          echo "**Dry Run:** ${{ steps.migration-info.outputs.dry_run }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ steps.migration-info.outputs.commit_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ steps.migration-info.outputs.branch }}" >> $GITHUB_STEP_SUMMARY
          echo "**Runner IP:** ${{ steps.runner-ip.outputs.ip }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Migrated Services:" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event.inputs.service }}" = "all" ] || [ "${{ github.event.inputs.service }}" = "restaurant" ]; then
            echo "- ✅ Restaurant Service" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ github.event.inputs.service }}" = "all" ] || [ "${{ github.event.inputs.service }}" = "order" ]; then
            echo "- ✅ Order Service" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ github.event.inputs.service }}" = "all" ] || [ "${{ github.event.inputs.service }}" = "cart" ]; then
            echo "- ✅ Cart Service" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ This was a dry run. No changes were applied to the databases." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔧 Azure SQL Firewall Setup:" >> $GITHUB_STEP_SUMMARY
          echo "- **IP Address:** ${{ steps.runner-ip.outputs.ip }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Rule Name:** ${{ steps.add-firewall-rule.outputs.rule_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Automatically managed by workflow" >> $GITHUB_STEP_SUMMARY
      
      - name: Remove IP from Azure SQL Firewall
        if: always()
        run: |
          echo "=== Cleaning up Azure SQL Firewall Rule ==="
          RULE_NAME="${{ steps.add-firewall-rule.outputs.rule_name }}"
          
          if [ -n "$RULE_NAME" ]; then
            echo "Removing firewall rule: $RULE_NAME"
            
                         az sql server firewall-rule delete \
               --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
               --server ${{ secrets.AZURE_SQL_SERVER }} \
               --name "$RULE_NAME"
            
            echo "✅ Firewall rule removed successfully"
          else
            echo "⚠️  No firewall rule to remove"
          fi