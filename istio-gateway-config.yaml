# =======================================================================
# istio-gateway-config.yaml
# Creates the Istio Gateway resource that the smartdelivery VirtualService
# depends on.
#
# IMPORTANT — k3s ships BOTH the Kubernetes Gateway API (gateway.networking.k8s.io)
# AND Istio's own Gateway CRD (networking.istio.io). The ambiguous command
# "kubectl get gateway -A" resolves to the k8s Gateway API and shows nothing.
# Always use the full resource name to query Istio Gateways:
#
#   kubectl get gateways.networking.istio.io -A
#
# Apply:  kubectl apply -f istio-gateway-config.yaml
# =======================================================================
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: istio-public-gateway
  namespace: istio-system
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "api.smartdelivery.local"